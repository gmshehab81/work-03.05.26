<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <!-- inpute type html work  -->
    <form action="">
        <label for="">First Name</label>
        <input type="text" name="" id="" placeholder="input your first name">
        <br><br>
        <label for="">Last Name</label>
        <input type="text" name="" id="" placeholder="input your Last name">
        <br><br>
        <label for="">Email</label>
        Email : <input type="email" name="" id="" placeholder="input your Email">
        <br><br>
        <label for="pw">Password</label>
        <input type="password" name="" id="pw" placeholder="input your password">
        <br><br>
        Date of Birth : <input type="date" name="" id="">
        <br><br>
        Joining Date : <input type="date" name="" id="">
        <br><br>
        <input type="button" value="Login">
        <input type="button" value="Forgotten Password">
        <br><br>
        <input type="color" name="" id="" style="background-color: blue;">
        <br><br>
        <h4>Are you :</h4>
        <input type="radio" name="gender" id="">Male
        <input type="radio" name="gender" id="">Female
        <input type="radio" name="gender" id="">Other
        <br><br>
        <h4>What you Like :</h4>
        <input type="checkbox" name="" id="">Tea
        <input type="checkbox" name="" id="">Coffee
        <input type="checkbox" name="" id="">Hot Coffee
        <input type="checkbox" name="" id="">Cold Tea
        <br><br>
        <input type="file" name="" id="">
        <br><br>
        Telephone : <input type="tel" name="" id="">
        <br><br>

        First*:<input type="text" name="" id="" required placeholder="First name">
        <br><br>
        Last:<input type="text" name="" id="">
        <input type="button" value="Submit"> <br><br>
        
        <input type="range" name="" id="ra" min="10" max="90" >
        <label for="ra">Your performance :</label><br><br>
        
        <input type="search" name="Go Search" id="" placeholder="Go Search"> 
<br><br>
        <input type="url" name="Visit your webside" id="" placeholder="Visit your webside">



        </form>
        <!--dropdown-->
        <h4>Your Subject</h4>
        <select name="" id="">
            <option value="">Your Subject</option>
            <option value="Bangla">Bangla</option>
            <option value="English">English</option>
            <option value="Math">Math</option>
            <option value="Arabic">Arabic</option>
        </select>











</body>

</html>
